<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 魔術方塊競速計時器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #111; --panel: rgba(25, 25, 25, 0.9); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        /* UI 層級 */
        .overlay { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .card { background: var(--panel); padding: 20px; border-radius: 15px; position: absolute; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* 登錄畫面 */
        #login-screen { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; text-align: center; }
        #login-screen h2 { margin-top: 0; color: var(--primary); }
        
        /* 計時器面板 */
        #timer-screen { top: 20px; left: 20px; width: 260px; }
        #timer { font-size: 56px; font-family: 'Courier New', monospace; color: var(--primary); margin: 10px 0; text-shadow: 0 0 10px rgba(0,230,118,0.5); }
        #scramble { color: #ffeb3b; font-size: 15px; font-weight: bold; min-height: 2.5em; line-height: 1.3; }
        
        /* 排行榜 */
        #leaderboard { top: 20px; right: 20px; width: 240px; font-size: 14px; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #888; font-size: 12px; border-bottom: 1px solid #444; padding-bottom: 5px; }
        td { padding: 8px 0; border-bottom: 1px solid #222; }
        .gold { color: #ffd700; font-weight: bold; }

        /* 元件樣式 */
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; font-size: 16px; }
        button { background: var(--primary); border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .secondary-btn { background: #444; color: white; margin-top: 8px; }

        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="overlay">
    <div id="login-screen" class="card interactive">
        <h2>Cube Master</h2>
        <input type="text" id="className" placeholder="輸入班級 (例: 204)">
        <input type="text" id="name" placeholder="輸入姓名">
        <button onclick="startApp()">進入賽場</button>
    </div>

    <div id="timer-screen" class="card interactive" style="display:none;">
        <div id="scramble">正在生成打亂公式...</div>
        <div id="timer">0.000</div>
        <div id="user-display" style="font-size:12px; color:#aaa; margin-bottom:15px;"></div>
        <button id="upload-btn" onclick="uploadScore()" disabled>上傳成績</button>
        <button class="secondary-btn" onclick="resetAll()">重新挑戰</button>
        <p style="font-size:11px; color:#666; margin-top:15px;">提示：長按 [空白鍵] 或 [點擊背景] 開始</p>
    </div>

    <div id="leaderboard" class="card" style="display:none;">
        <h3 style="margin:0 0 10px 0; font-size:18px;">🏆 本日 Top 10</h3>
        <table>
            <thead><tr><th>#</th><th>姓名</th><th>時間</th></tr></thead>
            <tbody id="rank-body"></tbody>
        </table>
    </div>
</div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbyIF1zLil3lr7Kokc_TIK7DUULEshx03sijGvm7n-jA8AJnKnWQNZWWTkQuJpc9ADw/exec"; // <--- 請在此貼上部署後的 URL
    let startTime, timerInterval, running = false, lastTime = 0;
    
    // 3D 渲染變數
    let scene, camera, renderer, cubeGroup;

    // 初始化 3D 環境
    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        cubeGroup = new THREE.Group();
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00]; // 白、黃、紅、橘、藍、綠
        const geometry = new THREE.BoxGeometry(0.96, 0.96, 0.96);

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const materials = colors.map(c => new THREE.MeshBasicMaterial({ color: c }));
                    const cube = new THREE.Mesh(geometry, materials);
                    cube.position.set(x, y, z);
                    cubeGroup.add(cube);
                }
            }
        }
        scene.add(cubeGroup);
        camera.position.set(4, 4, 7);
        camera.lookAt(0, 0, 0);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (!running) {
            cubeGroup.rotation.y += 0.005;
            cubeGroup.rotation.x += 0.003;
        } else {
            cubeGroup.rotation.y += 0.05; // 計時中快速旋轉
        }
        renderer.render(scene, camera);
    }

    // 啟動應用
    function startApp() {
        const c = document.getElementById('className').value;
        const n = document.getElementById('name').value;
        if(!c || !n) return alert("請輸入完整資料");
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('timer-screen').style.display = 'block';
        document.getElementById('leaderboard').style.display = 'block';
        document.getElementById('user-display').innerText = `目前選手：${c} - ${n}`;
        
        init3D();
        generateScramble();
        updateLeaderboard();
        initControls();
    }

    // 生成 WCA 打亂公式
    function generateScramble() {
        const moves = ["U", "D", "L", "R", "F", "B"];
        const mods = ["", "'", "2"];
        let s = [];
        let lastMove = "";
        while(s.length < 20) {
            let m = moves[Math.floor(Math.random()*6)];
            if(m !== lastMove) {
                s.push(m + mods[Math.floor(Math.random()*3)]);
                lastMove = m;
            }
        }
        document.getElementById('scramble').innerText = s.join(" ");
    }

    // 計時控制邏輯
    function toggleTimer() {
        if (!running) {
            running = true;
            startTime = Date.now();
            document.getElementById('timer').style.color = "var(--primary)";
            document.getElementById('upload-btn').disabled = true;
            timerInterval = setInterval(() => {
                lastTime = ((Date.now() - startTime) / 1000).toFixed(3);
                document.getElementById('timer').innerText = lastTime;
            }, 10);
        } else {
            running = false;
            clearInterval(timerInterval);
            document.getElementById('upload-btn').disabled = false;
        }
    }

    function initControls() {
        // 鍵盤空白鍵
        window.addEventListener('keydown', (e) => {
            if(e.code === "Space") { e.preventDefault(); if(!running) document.getElementById('timer').style.color = "red"; }
        });
        window.addEventListener('keyup', (e) => { if(e.code === "Space") toggleTimer(); });
        
        // 觸控與滑鼠 (點擊背景計時)
        const container = document.getElementById('canvas-container');
        container.addEventListener('mousedown', (e) => { e.preventDefault(); toggleTimer(); });
        container.addEventListener('touchstart', (e) => { e.preventDefault(); toggleTimer(); });
    }

    // 資料上傳與更新
    async function uploadScore() {
        const btn = document.getElementById('upload-btn');
        btn.innerText = "上傳中...";
        btn.disabled = true;
        const payload = {
            className: document.getElementById('className').value,
            name: document.getElementById('name').value,
            time: lastTime
        };
        try {
            await fetch(gasUrl, { method: "POST", body: JSON.stringify(payload) });
            alert("成績上傳成功！");
            btn.innerText = "已上傳";
            updateLeaderboard();
        } catch(e) { alert("連線錯誤"); btn.disabled = false; btn.innerText = "重新上傳"; }
    }

    async function updateLeaderboard() {
        try {
            const res = await fetch(gasUrl);
            const data = await res.json();
            document.getElementById('rank-body').innerHTML = data.map((r, i) => `
                <tr class="${i === 0 ? 'gold' : ''}">
                    <td>${i+1}</td><td>${r[2]}</td><td>${parseFloat(r[3]).toFixed(3)}s</td>
                </tr>
            `).join('');
        } catch(e) { console.log("無法獲取排行榜"); }
    }

    function resetAll() {
        document.getElementById('timer').innerText = "0.000";
        document.getElementById('upload-btn').innerText = "上傳成績";
        document.getElementById('upload-btn').disabled = true;
        generateScramble();
    }

    window.addEventListener('resize', () => {
        if(camera) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
</body>
</html>
