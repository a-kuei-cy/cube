<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔術方塊競技場 | Cube Battle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; touch-action: none; }
        
        /* UI 介面層 */
        #ui-layer { position: absolute; z-index: 100; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .panel { background: rgba(20, 20, 20, 0.95); padding: 20px; border-radius: 15px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 登錄視窗 */
        #login-box { top: 50%; left: 50%; transform: translate(-50%, -50%); position: absolute; width: 280px; text-align: center; }
        
        /* 計時器面板 */
        #timer-box { top: 20px; left: 20px; position: absolute; width: 220px; }
        #timer { font-size: 42px; font-family: 'Courier New', monospace; color: #00e676; margin: 10px 0; font-weight: bold; }
        
        input { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #555; background: #222; color: #fff; font-size: 16px; }
        button { background: #00e676; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; color: #888; }
        
        #canvas-container { position: absolute; width: 100vw; height: 100vh; z-index: 1; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div id="login-box" class="panel interactive">
        <h2 style="margin-top:0; color:#00e676;">魔術方塊競賽</h2>
        <input type="text" id="className" placeholder="班級 (例: 501)">
        <input type="text" id="name" placeholder="姓名">
        <button onclick="initGame()">進入賽場</button>
    </div>

    <div id="timer-box" class="panel interactive" style="display:none;">
        <div id="timer">0.000</div>
        <div id="status" style="font-size:12px; color:#aaa; margin-bottom:10px;">點擊背景或空白鍵開始</div>
        <button id="upload-btn" onclick="uploadData()" disabled>上傳成績</button>
        <button onclick="scrambleAndReset()" style="background:#444; color:white; margin-top:8px; font-size:12px;">重新打亂</button>
    </div>
</div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbyIF1zLil3lr7Kokc_TIK7DUULEshx03sijGvm7n-jA8AJnKnWQNZWWTkQuJpc9ADw/exec"; // <--- 務必替換成你的 URL
    let scene, camera, renderer, controls, cubes = [];
    let startTime, timerInterval, running = false, lastTime = 0;

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a); // 設定背景色避免黑幕

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 啟動軌道控制 (支援滑鼠與平板觸控)
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        const geom = new THREE.BoxGeometry(0.95, 0.95, 0.95);

        for(let x=-1; x<=1; x++) {
            for(let y=-1; y<=1; y++) {
                for(let z=-1; z<=1; z++) {
                    const mats = colors.map(c => new THREE.MeshBasicMaterial({ color: c }));
                    const cube = new THREE.Mesh(geom, mats);
                    cube.position.set(x, y, z);
                    scene.add(cube);
                    cubes.push(cube);
                }
            }
        }
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        renderer.render(scene, camera);
    }

    function initGame() {
        if(!document.getElementById('className').value || !document.getElementById('name').value) return alert("請填寫資料");
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('timer-box').style.display = 'block';
        init3D();
        scrambleAndReset();
        
        // 事件監聽
        window.addEventListener('keydown', (e) => { if(e.code === "Space") { e.preventDefault(); handleTimer(); } });
        renderer.domElement.addEventListener('touchstart', (e) => { e.preventDefault(); handleTimer(); });
    }

    function handleTimer() {
        if(!running) {
            running = true; startTime = Date.now();
            document.getElementById('timer').style.color = "#ff5252";
            timerInterval = setInterval(() => {
                lastTime = ((Date.now() - startTime)/1000).toFixed(3);
                document.getElementById('timer').innerText = lastTime;
            }, 10);
            document.getElementById('upload-btn').disabled = true;
        } else {
            running = false; clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#00e676";
            document.getElementById('upload-btn').disabled = false;
        }
    }

    function scrambleAndReset() {
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        cubes.forEach(c => {
            c.material.forEach(m => m.color.setHex(colors[Math.floor(Math.random()*6)]));
            c.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
        });
        document.getElementById('timer').innerText = "0.000";
    }

    async function uploadData() {
        const btn = document.getElementById('upload-btn');
        btn.innerText = "上傳中...";
        const payload = {
            className: document.getElementById('className').value,
            name: document.getElementById('name').value,
            time: lastTime
        };
        try {
            await fetch(gasUrl, { method: "POST", body: JSON.stringify(payload) });
            alert("成績上傳成功！方塊已重置為單一顏色。");
            resetToSolid();
            btn.innerText = "上傳完成";
            btn.disabled = true;
        } catch(e) { alert("上傳失敗，請檢查網路"); btn.innerText = "重新上傳"; }
    }

    function resetToSolid() {
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        cubes.forEach(c => {
            c.rotation.set(0, 0, 0);
            c.material.forEach((m, i) => m.color.setHex(colors[i]));
        });
    }

    window.addEventListener('resize', () => {
        if(camera) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>
</body>
</html>
