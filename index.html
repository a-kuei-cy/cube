<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 魔術方塊競賽系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; overflow: hidden; }
        .ui { position: absolute; z-index: 100; pointer-events: none; width: 100%; height: 100%; }
        .panel { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; pointer-events: auto; }
        #timer-box { top: 10px; left: 10px; position: absolute; }
        #login-box { top: 50%; left: 50%; transform: translate(-50%, -50%); position: absolute; width: 250px; text-align: center; }
        #timer { font-size: 40px; color: #00e676; font-family: monospace; }
        input { width: 80%; padding: 8px; margin: 5px; border-radius: 4px; border: none; }
        button { background: #00e676; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="ui">
    <div id="login-box" class="panel">
        <h2>參賽登錄</h2>
        <input type="text" id="className" placeholder="班級 (例: 301)">
        <input type="text" id="name" placeholder="姓名">
        <button onclick="startApp()">進入賽場</button>
    </div>

    <div id="timer-box" class="panel" style="display:none;">
        <div id="scramble">等待打亂...</div>
        <div id="timer">0.000</div>
        <button id="upload-btn" onclick="uploadData()" disabled>上傳成績</button>
        <button onclick="scrambleCube()" style="background:#444; color:white;">重新打亂</button>
    </div>
</div>

<script>
    const gasUrl = "你的_GAS_網址"; 
    let scene, camera, renderer, controls, cubes = [];
    let startTime, timerInterval, running = false, lastTime = 0;

    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 建立 3D 軌道控制 (支援滑鼠、平板撥動視角)
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        const geom = new THREE.BoxGeometry(0.95, 0.95, 0.95);

        for(let x=-1; x<=1; x++) {
            for(let y=-1; y<=1; y++) {
                for(let z=-1; z<=1; z++) {
                    const mats = colors.map(c => new THREE.MeshBasicMaterial({color: c}));
                    const cube = new THREE.Mesh(geom, mats);
                    cube.position.set(x, y, z);
                    scene.add(cube);
                    cubes.push(cube);
                }
            }
        }
        camera.position.set(5, 5, 5);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // 打亂邏輯：視覺上隨機分配顏色，模仿打亂狀態
    function scrambleCube() {
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        cubes.forEach(c => {
            c.material.forEach(m => m.color.setHex(colors[Math.floor(Math.random()*6)]));
            c.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
        });
        document.getElementById('scramble').innerText = "方塊已打亂，請準備！";
        resetTimerUI();
    }

    // 變回同一顏色 (重置)
    function resetToSolid() {
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        cubes.forEach((c, i) => {
            c.rotation.set(0, 0, 0);
            c.material.forEach((m, mi) => m.color.setHex(colors[mi]));
        });
    }

    function startApp() {
        if(!document.getElementById('className').value) return;
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('timer-box').style.display = 'block';
        init3D();
        scrambleCube();
        
        // 鍵盤空白鍵監聽
        window.addEventListener('keydown', (e) => {
            if(e.code === "Space") {
                e.preventDefault();
                toggleTimer();
            }
        });
        // 點擊螢幕計時 (平板友善)
        renderer.domElement.addEventListener('touchstart', (e) => {
            toggleTimer();
        });
    }

    function toggleTimer() {
        if(!running) {
            running = true; startTime = Date.now();
            document.getElementById('timer').style.color = "#ff5252";
            timerInterval = setInterval(() => {
                lastTime = ((Date.now() - startTime)/1000).toFixed(3);
                document.getElementById('timer').innerText = lastTime;
            }, 10);
            document.getElementById('upload-btn').disabled = true;
        } else {
            running = false; clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#00e676";
            document.getElementById('upload-btn').disabled = false;
        }
    }

    function resetTimerUI() {
        document.getElementById('timer').innerText = "0.000";
        document.getElementById('upload-btn').disabled = true;
    }

    async function uploadData() {
        const btn = document.getElementById('upload-btn');
        btn.innerText = "上傳中...";
        const d = {
            className: document.getElementById('className').value,
            name: document.getElementById('name').value,
            time: lastTime
        };
        await fetch(gasUrl, { method: "POST", body: JSON.stringify(d) });
        alert("上傳成功！方塊將重置。");
        btn.innerText = "上傳成績";
        resetToSolid(); // 結束後變回整齊顏色
    }
</script>
</body>
</html>
