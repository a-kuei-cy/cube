<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔術方塊競賽系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #ui { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        .panel { background: rgba(30, 30, 30, 0.9); padding: 20px; border-radius: 12px; pointer-events: auto; border: 1px solid #444; }
        #login-box { top: 50%; left: 50%; transform: translate(-50%, -50%); position: absolute; width: 260px; text-align: center; }
        #timer-box { top: 10px; left: 10px; position: absolute; width: 200px; }
        #timer { font-size: 36px; color: #00e676; font-family: monospace; margin: 10px 0; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #555; background: #222; color: #fff; }
        button { background: #00e676; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        button:disabled { background: #444; color: #888; }
        #canvas-container { width: 100vw; height: 100vh; background: #111; }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui">
    <div id="login-box" class="panel">
        <h2 style="color:#00e676">Cube Battle</h2>
        <input type="text" id="className" placeholder="班級 (例: 301)">
        <input type="text" id="name" placeholder="姓名">
        <button onclick="startApp()">進入賽場</button>
    </div>

    <div id="timer-box" class="panel" style="display:none;">
        <div id="timer">0.000</div>
        <button id="upload-btn" onclick="uploadData()" disabled>上傳成績</button>
        <button onclick="scrambleCube()" style="background:#444; color:white; font-size:12px;">重新打亂方塊</button>
    </div>
</div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbyIF1zLil3lr7Kokc_TIK7DUULEshx03sijGvm7n-jA8AJnKnWQNZWWTkQuJpc9ADw/exec"; // 記得替換！
    let scene, camera, renderer, controls, cubes = [];
    let startTime, timerInterval, running = false, lastTime = 0;

    function init3D() {
        // 1. 初始化場景
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // 防止黑幕，設定背景色

        // 2. 相機設定 (確保位置在外部)
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 5);

        // 3. 渲染器
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 支援高解析度螢幕
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 4. 軌道控制 (支援滑鼠與平板)
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 5. 建立方塊
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        const geom = new THREE.BoxGeometry(0.92, 0.92, 0.92);

        for(let x=-1; x<=1; x++) {
            for(let y=-1; y<=1; y++) {
                for(let z=-1; z<=1; z++) {
                    // 使用 MeshBasicMaterial 不需要燈光也能看到顏色
                    const mats = colors.map(c => new THREE.MeshBasicMaterial({ color: c }));
                    const cube = new THREE.Mesh(geom, mats);
                    cube.position.set(x, y, z);
                    scene.add(cube);
                    cubes.push(cube);
                }
            }
        }
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if (controls) controls.update();
        renderer.render(scene, camera);
    }

    function startApp() {
        if(!document.getElementById('className').value || !document.getElementById('name').value) {
            alert("請填寫班級與姓名");
            return;
        }
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('timer-box').style.display = 'block';
        init3D();
        
        // 計時器事件
        window.addEventListener('keydown', (e) => { if(e.code === "Space") { e.preventDefault(); toggleTimer(); } });
        renderer.domElement.addEventListener('touchstart', (e) => { e.preventDefault(); toggleTimer(); });
    }

    function toggleTimer() {
        if(!running) {
            running = true; startTime = Date.now();
            document.getElementById('timer').style.color = "#ff5252";
            timerInterval = setInterval(() => {
                lastTime = ((Date.now() - startTime)/1000).toFixed(3);
                document.getElementById('timer').innerText = lastTime;
            }, 10);
            document.getElementById('upload-btn').disabled = true;
        } else {
            running = false; clearInterval(timerInterval);
            document.getElementById('timer').style.color = "#00e676";
            document.getElementById('upload-btn').disabled = false;
        }
    }

    function scrambleCube() {
        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00];
        cubes.forEach(c => {
            c.material.forEach(m => m.color.setHex(colors[Math.floor(Math.random()*6)]));
            c.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
        });
    }

    async function uploadData() {
        const btn = document.getElementById('upload-btn');
        btn.innerText = "上傳中...";
        const d = {
            className: document.getElementById('className').value,
            name: document.getElementById('name').value,
            time: lastTime
        };
        try {
            await fetch(gasUrl, { method: "POST", body: JSON.stringify(d) });
            alert("成績上傳成功！");
            location.reload(); // 重新整理變回原始顏色
        } catch(e) {
            alert("上傳失敗，請檢查網路");
            btn.innerText = "重新上傳";
        }
    }
</script>
</body>
</html>
