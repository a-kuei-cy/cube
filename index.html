<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>專業 3D 魔術方塊計時器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #00e676; --bg: #111; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .overlay { position: absolute; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        .card { background: rgba(20,20,20,0.95); padding: 20px; border-radius: 15px; position: absolute; border: 1px solid #444; }
        #login-screen { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; text-align: center; }
        #timer-screen { top: 20px; left: 20px; width: 240px; }
        #timer { font-size: 48px; font-family: monospace; color: var(--primary); margin: 10px 0; }
        #scramble { color: #ffeb3b; font-size: 16px; font-weight: bold; margin-bottom: 10px; min-height: 3em; }
        input { width: 85%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #333; color: white; }
        button { background: var(--primary); border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<div class="overlay">
    <div id="login-screen" class="card interactive">
        <h2>Cube Master Pro</h2>
        <input type="text" id="className" placeholder="班級">
        <input type="text" id="name" placeholder="姓名">
        <button onclick="startApp()">開始挑戰</button>
    </div>

    <div id="timer-screen" class="card interactive" style="display:none;">
        <div id="scramble">打亂中...</div>
        <div id="timer">0.000</div>
        <button id="upload-btn" onclick="uploadScore()" disabled>上傳成績</button>
        <button onclick="resetChallenge()" style="background:#444; color:white; margin-top:10px; border:none; padding:8px; width:100%; border-radius:5px;">下一組打亂</button>
    </div>
</div>

<script>
    const gasUrl = "你的_GAS_網址"; 
    let scene, camera, renderer, cubes = [], running = false, startTime, lastTime = 0;

    // 1. 初始化 3D 舞台
    function init3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const colors = [0xffffff, 0xffff00, 0xff0000, 0xffa500, 0x0000ff, 0x00ff00]; // 右左、上下、前後
        const geom = new THREE.BoxGeometry(0.95, 0.95, 0.95);

        for(let x=-1; x<=1; x++) {
            for(let y=-1; y<=1; y++) {
                for(let z=-1; z<=1; z++) {
                    const mats = colors.map(c => new THREE.MeshBasicMaterial({color: c}));
                    const cube = new THREE.Mesh(geom, mats);
                    cube.position.set(x, y, z);
                    scene.add(cube);
                    cubes.push(cube);
                }
            }
        }
        camera.position.set(4, 4, 6);
        camera.lookAt(0,0,0);
        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        if(!running) { scene.rotation.y += 0.005; }
        renderer.render(scene, camera);
    }

    // 2. 精確旋轉邏輯：根據 WCA 指令旋轉層面
    function makeMove(move) {
        const face = move[0]; // R, L, U, D, F, B
        const isClockwise = !move.includes("'");
        const isDouble = move.includes("2");
        const angle = (isDouble ? Math.PI : Math.PI / 2) * (isClockwise ? -1 : 1);

        // 建立臨時旋轉組
        const group = new THREE.Group();
        scene.add(group);

        const threshold = 0.1;
        const toRotate = cubes.filter(c => {
            if(face === 'R') return c.position.x > threshold;
            if(face === 'L') return c.position.x < -threshold;
            if(face === 'U') return c.position.y > threshold;
            if(face === 'D') return c.position.y < -threshold;
            if(face === 'F') return c.position.z > threshold;
            if(face === 'B') return c.position.z < -threshold;
        });

        toRotate.forEach(c => group.add(c));

        // 執行旋轉軸
        if(face === 'R' || face === 'L') group.rotation.x = angle;
        if(face === 'U' || face === 'D') group.rotation.y = angle;
        if(face === 'F' || face === 'B') group.rotation.z = angle;

        // 旋轉完畢後釋放回場景並更新座標（重要！）
        group.updateMatrixWorld();
        toRotate.forEach(c => {
            c.applyMatrix4(group.matrixWorld);
            scene.add(c);
        });
        scene.remove(group);
    }

    // 3. 生成與執行打亂
    function startApp() {
        if(!document.getElementById('className').value || !document.getElementById('name').value) return alert("請輸入資料");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('timer-screen').style.display = 'block';
        init3D();
        resetChallenge();
        initControls();
    }

    async function resetChallenge() {
        // 重置位置
        cubes.forEach((c, i) => {
            c.rotation.set(0,0,0);
            c.position.set((i%3)-1, Math.floor((i/3)%3)-1, Math.floor(i/9)-1);
        });
        
        const moves = ["U", "D", "L", "R", "F", "B"];
        const mods = ["", "'", "2"];
        let s = [];
        for(let i=0; i<15; i++) {
            let m = moves[Math.floor(Math.random()*6)] + mods[Math.floor(Math.random()*3)];
            s.push(m);
            makeMove(m); // 即時在 3D 空間中執行每一動
        }
        document.getElementById('scramble').innerText = s.join(" ");
        document.getElementById('timer').innerText = "0.000";
    }

    // 4. 計時邏輯 (與前版相同)
    function initControls() {
        window.addEventListener('keyup', (e) => { if(e.code === "Space") toggleTimer(); });
        document.getElementById('canvas-container').addEventListener('mousedown', toggleTimer);
    }

    function toggleTimer() {
        if(!running) {
            running = true; startTime = Date.now();
            document.getElementById('timer').style.color = "var(--primary)";
            timerInterval = setInterval(() => {
                lastTime = ((Date.now() - startTime)/1000).toFixed(3);
                document.getElementById('timer').innerText = lastTime;
            }, 10);
        } else {
            running = false; clearInterval(timerInterval);
            document.getElementById('upload-btn').disabled = false;
        }
    }

    async function uploadScore() {
        // ... (保持先前的 uploadScore 程式碼)
    }
</script>
</body>
</html>
